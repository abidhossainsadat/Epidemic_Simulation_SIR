<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epidemic Spread Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a1a 50%, #2d2d2d 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.8em;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .control-group {
            background: rgba(40, 40, 40, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .control-group:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #ffffff;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .control-group input[type="range"],
        .control-group input[type="number"] {
            width: 120px;
            height: 6px; /* Adjusted height for number inputs too */
            border-radius: 3px;
            background: #333333;
            outline: none;
            margin-bottom: 5px;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 8px;
            /* For number inputs specifically */
            -moz-appearance: textfield; /* Firefox */
        }
        /* Hide arrows for number inputs in Webkit browsers */
        .control-group input[type="number"]::-webkit-outer-spin-button,
        .control-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .control-group input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        
        .control-group input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        
        .control-group span {
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        button {
            padding: 15px 30px;
            border: 2px solid transparent;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        .start-btn {
            background: linear-gradient(45deg, #00C851, #007E33);
            color: white;
            border-color: #00C851;
        }
        
        .start-btn:hover {
            background: linear-gradient(45deg, #00E676, #00C851);
            box-shadow: 0 0 25px rgba(0, 200, 81, 0.4);
        }
        
        .stop-btn {
            background: linear-gradient(45deg, #FF5722, #D32F2F);
            color: white;
            border-color: #FF5722;
        }
        
        .stop-btn:hover {
            background: linear-gradient(45deg, #FF6F42, #FF5722);
            box-shadow: 0 0 25px rgba(255, 87, 34, 0.4);
        }
        
        .reset-btn {
            background: linear-gradient(45deg, #2196F3, #1565C0);
            color: white;
            border-color: #2196F3;
        }
        
        .reset-btn:hover {
            background: linear-gradient(45deg, #42A5F5, #2196F3);
            box-shadow: 0 0 25px rgba(33, 150, 243, 0.4);
        }
        
        button:hover {
            transform: translateY(-3px);
        }
        
        button:active {
            transform: translateY(-1px);
        }
        
        .visualization-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        
        .canvas-container {
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        
        .canvas-container:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .canvas-container h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
        }
        
        #simulationCanvas {
            width: 100%;
            height: 400px;
            border-radius: 15px;
            background: #0a0a0a;
            cursor: crosshair;
            border: 2px solid #333333;
            transition: border-color 0.3s ease;
        }
        
        #simulationCanvas:hover {
            border-color: #4CAF50;
        }
        
        .chart-container {
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 20px;
            height: 440px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }
        
        .chart-container:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .chart-container h3 {
            color: #ffffff;
            margin-bottom: 15px;
            font-size: 1.3em;
            font-weight: 600;
            text-align: center;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 25px 0;
            text-align: center;
            gap: 15px;
        }
        
        .stat-item {
            background: linear-gradient(145deg, #2a2a2a, #1e1e1e);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            min-width: 140px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #4CAF50, #FF5722, #2196F3);
            opacity: 0.7;
        }
        
        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .stat-item div:last-child {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        
        .susceptible { 
            color: #4CAF50; 
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }
        .infected { 
            color: #FF5722; 
            text-shadow: 0 0 10px rgba(255, 87, 34, 0.5);
        }
        .recovered { 
            color: #2196F3; 
            text-shadow: 0 0 10px rgba(33, 150, 243, 0.5);
        }
        
        .legend {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 25px 0;
            padding: 20px;
            background: linear-gradient(145deg, #2a2a2a, #1e1e1e);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        
        .legend-item:hover {
            transform: scale(1.05);
        }
        
        .legend-color {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .legend-item:hover .legend-color {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }
        
        @media (max-width: 768px) {
            .visualization-container {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦠 Epidemic Spread Simulation 🦠</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>Infection Rate:</label>
                <input type="range" id="infectionRate" min="0.01" max="0.1" step="0.01" value="0.03">
                <span id="infectionValue">0.03</span>
            </div>
            
            <div class="control-group">
                <label>Recovery Rate:</label>
                <input type="range" id="recoveryRate" min="0.01" max="0.1" step="0.01" value="0.02">
                <span id="recoveryValue">0.02</span>
            </div>

            <div class="control-group">
                <label>Simulation End Time:</label>
                <input type="range" id="endTime" min="100" max="1000" value="200">
                <span id="endTimeValue">200</span>
            </div>

            <div class="control-group">
                <label>Initial Susceptible:</label>
                <input type="number" id="initialSusceptible" min="0" value="700">
            </div>
            <div class="control-group">
                <label>Initial Infected:</label>
                <input type="number" id="initialInfected" min="0" value="1">
            </div>
            <div class="control-group">
                <label>Initial Recovered:</label>
                <input type="number" id="initialRecovered" min="0" value="0">
            </div>
            
            <div class="control-group">
                <button class="start-btn" onclick="startSimulation()">▶️ Start</button>
                <button class="stop-btn" onclick="stopSimulation()">⏸️ Stop</button>
                <button class="reset-btn" onclick="resetSimulation()">🔄 Reset</button>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number susceptible" id="susceptibleCount">700</div>
                <div>Susceptible</div>
            </div>
            <div class="stat-item">
                <div class="stat-number infected" id="infectedCount">1</div>
                <div>Infected</div>
            </div>
            <div class="stat-item">
                <div class="stat-number recovered" id="recoveredCount">0</div>
                <div>Recovered</div>
            </div>
        </div>
        
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color susceptible" style="background-color: #4CAF50;"></div>
                <span>Susceptible</span>
            </div>
            <div class="legend-item">
                <div class="legend-color infected" style="background-color: #FF5722;"></div>
                <span>Infected</span>
            </div>
            <div class="legend-item">
                <div class="legend-color recovered" style="background-color: #2196F3;"></div>
                <span>Recovered</span>
            </div>
        </div>
        
        <div class="visualization-container">
            <div class="canvas-container">
                <h3>🗺️ Spatial Distribution</h3>
                <canvas id="simulationCanvas" width="600" height="400"></canvas>
                <p style="text-align: center; margin-top: 15px; opacity: 0.8; font-style: italic; color: #4CAF50;"> ->> Click anywhere to add infected individuals <<-</p>
            </div>
            
            <div class="chart-container">
                <h3>📊 Population Timeline</h3>
                <canvas id="timeChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let canvas, ctx, chart;
        let individuals = [];
        let isRunning = false;
        let animationId;
        let simulationTime = 0; // Tracks current simulation time
        
        // Simulation parameters (populationSize is now dynamic)
        let infectionRate = 0.03;
        let recoveryRate = 0.02;
        let infectionRadius = 30;
        let simulationEndTime = 200;

        // Initial counts from new input fields - defaults adjusted to match your image
        let initialSusceptibleCount = 700;
        let initialInfectedCount = 1;
        let initialRecoveredCount = 0;
        
        // Individual states
        const SUSCEPTIBLE = 0;
        const INFECTED = 1;
        const RECOVERED = 2;
        
        // Colors
        const colors = {
            [SUSCEPTIBLE]: '#4CAF50',
            [INFECTED]: '#FF5722',
            [RECOVERED]: '#2196F3'
        };
        
        // Individual class
        class Individual {
            constructor(x, y, state = SUSCEPTIBLE) {
                this.x = x;
                this.y = y;
                this.state = state;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.infectionTime = 0;
                this.radius = 3;
            }
            
            update() {
                // Movement
                this.x += this.vx;
                this.y += this.vy;
                
                // Boundary checking
                if (this.x <= this.radius || this.x >= canvas.width - this.radius) {
                    this.vx *= -1;
                }
                if (this.y <= this.radius || this.y >= canvas.height - this.radius) {
                    this.vy *= -1;
                }
                
                // Keep within bounds
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));
                
                // Update infection state
                if (this.state === INFECTED) {
                    this.infectionTime++;
                    if (Math.random() < recoveryRate) {
                        this.state = RECOVERED;
                    }
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = colors[this.state];
                ctx.fill();
                
                // Add enhanced glow effect for infected
                if (this.state === INFECTED) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 4, 0, Math.PI * 2);
                    ctx.strokeStyle = colors[INFECTED];
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Pulsing effect
                    const pulse = Math.sin(Date.now() * 0.01) * 0.5 + 0.5;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius + 8 * pulse, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 87, 34, ${0.3 * pulse})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
                
                // Add subtle glow for all individuals
                ctx.shadowColor = colors[this.state];
                ctx.shadowBlur = 5;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = colors[this.state];
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // Initialize
        function init() {
            canvas = document.getElementById('simulationCanvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas size
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            // Initialize chart
            initChart();
            
            // Setup event listeners
            setupEventListeners();

            // Set initial input values based on defaults (matching the image provided)
            document.getElementById('initialSusceptible').value = initialSusceptibleCount;
            document.getElementById('initialInfected').value = initialInfectedCount;
            document.getElementById('initialRecovered').value = initialRecoveredCount;

            // Initialize population after setting up event listeners for initial counts
            resetSimulation(); 
        }
        
        function setupEventListeners() {
            // Infection Rate slider
            document.getElementById('infectionRate').addEventListener('input', (e) => {
                infectionRate = parseFloat(e.target.value);
                document.getElementById('infectionValue').textContent = infectionRate;
            });
            
            // Recovery Rate slider
            document.getElementById('recoveryRate').addEventListener('input', (e) => {
                recoveryRate = parseFloat(e.target.value);
                document.getElementById('recoveryValue').textContent = recoveryRate;
            });

            // End Time slider
            document.getElementById('endTime').addEventListener('input', (e) => {
                simulationEndTime = parseInt(e.target.value);
                document.getElementById('endTimeValue').textContent = simulationEndTime;
            });

            // New: Initial population count inputs
            document.getElementById('initialSusceptible').addEventListener('input', (e) => {
                initialSusceptibleCount = parseInt(e.target.value);
                if (initialSusceptibleCount < 0) {
                    initialSusceptibleCount = 0;
                    e.target.value = 0;
                }
                if (!isRunning) resetSimulation(); // Reset to show changes immediately
            });
            document.getElementById('initialInfected').addEventListener('input', (e) => {
                initialInfectedCount = parseInt(e.target.value);
                if (initialInfectedCount < 0) {
                    initialInfectedCount = 0;
                    e.target.value = 0;
                }
                if (!isRunning) resetSimulation();
            });
            document.getElementById('initialRecovered').addEventListener('input', (e) => {
                initialRecoveredCount = parseInt(e.target.value);
                if (initialRecoveredCount < 0) {
                    initialRecoveredCount = 0;
                    e.target.value = 0;
                }
                if (!isRunning) resetSimulation();
            });
            
            // Canvas click to add infected
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Find nearby individuals and infect them
                individuals.forEach(individual => {
                    const dx = individual.x - x;
                    const dy = individual.y - y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < 20 && individual.state === SUSCEPTIBLE) {
                        individual.state = INFECTED;
                    }
                });
            });
        }

        // Removed adjustInitialCounts() as total population is now sum of inputs

        function initChart() {
            const chartCtx = document.getElementById('timeChart').getContext('2d');
            chart = new Chart(chartCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Susceptible',
                        data: [],
                        borderColor: '#4CAF50',
                        backgroundColor: 'rgba(76, 175, 80, 0.1)',
                        fill: true
                    }, {
                        label: 'Infected',
                        data: [],
                        borderColor: '#FF5722',
                        backgroundColor: 'rgba(255, 87, 34, 0.1)',
                        fill: true
                    }, {
                        label: 'Recovered',
                        data: [],
                        borderColor: '#2196F3',
                        backgroundColor: 'rgba(33, 150, 243, 0.1)',
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: {
                                color: 'white'
                            }
                        }
                    },
                    scales: {
                        x: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            title: {
                                display: true,
                                text: 'Time Steps',
                                color: 'white'
                            }
                        },
                        y: {
                            ticks: { color: 'white' },
                            grid: { color: 'rgba(255,255,255,0.1)' },
                            title: {
                                display: true,
                                text: 'Number of Individuals',
                                color: 'white'
                            }
                        }
                    }
                }
            });
        }
        
        function createPopulation() {
            individuals = [];

            // The total population is now the sum of the initial counts
            const totalPopulation = initialSusceptibleCount + initialInfectedCount + initialRecoveredCount;

            if (totalPopulation <= 0) {
                console.warn("Total population is zero or negative. No individuals will be created.");
                return; // Prevent creating an empty simulation
            }

            // Create individuals based on initial counts
            for (let count = 0; count < initialInfectedCount; count++) {
                const x = Math.random() * (canvas.width - 20) + 10;
                const y = Math.random() * (canvas.height - 20) + 10;
                individuals.push(new Individual(x, y, INFECTED));
            }
            for (let count = 0; count < initialRecoveredCount; count++) {
                const x = Math.random() * (canvas.width - 20) + 10;
                const y = Math.random() * (canvas.height - 20) + 10;
                individuals.push(new Individual(x, y, RECOVERED));
            }
            // Fill the rest with susceptible
            for (let count = 0; count < initialSusceptibleCount; count++) {
                const x = Math.random() * (canvas.width - 20) + 10;
                const y = Math.random() * (canvas.height - 20) + 10;
                individuals.push(new Individual(x, y, SUSCEPTIBLE));
            }

            // Shuffle individuals to mix states visually
            for (let k = individuals.length - 1; k > 0; k--) {
                const j = Math.floor(Math.random() * (k + 1));
                [individuals[k], individuals[j]] = [individuals[j], individuals[k]];
            }
        }
        
        function updateSimulation() {
            if (simulationTime >= simulationEndTime) {
                stopSimulation();
                return;
            }

            // Update all individuals
            individuals.forEach(individual => individual.update());
            
            // Check for new infections
            individuals.forEach(individual => {
                if (individual.state === INFECTED) {
                    individuals.forEach(other => {
                        if (other.state === SUSCEPTIBLE) {
                            const dx = individual.x - other.x;
                            const dy = individual.y - other.y;
                            const distance = Math.sqrt(dx * dx + dy * dy);
                            
                            if (distance < infectionRadius && Math.random() < infectionRate) {
                                other.state = INFECTED;
                            }
                        }
                    });
                }
            });
            
            // Update statistics
            updateStats();
            updateChart();
            simulationTime++; // Increment simulation time
        }
        
        function updateStats() {
            let susceptible = 0, infected = 0, recovered = 0;
            
            individuals.forEach(individual => {
                switch (individual.state) {
                    case SUSCEPTIBLE: susceptible++; break;
                    case INFECTED: infected++; break;
                    case RECOVERED: recovered++; break;
                }
            });
            
            document.getElementById('susceptibleCount').textContent = susceptible;
            document.getElementById('infectedCount').textContent = infected;
            document.getElementById('recoveredCount').textContent = recovered;
        }
        
        function updateChart() {
            let susceptible = 0, infected = 0, recovered = 0;
            individuals.forEach(individual => {
                switch (individual.state) {
                    case SUSCEPTIBLE: susceptible++; break;
                    case INFECTED: infected++; break;
                    case RECOVERED: recovered++; break;
                }
            });
            
            chart.data.labels.push(simulationTime);
            chart.data.datasets[0].data.push(susceptible);
            chart.data.datasets[1].data.push(infected);
            chart.data.datasets[2].data.push(recovered);
            
            chart.update('none');
        }
        
        function draw() {
            // Clear canvas with dark background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Add subtle grid pattern
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 20) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Draw individuals
            individuals.forEach(individual => individual.draw());
        }
        
        function animate() {
            if (isRunning && simulationTime < simulationEndTime) {
                updateSimulation();
                draw();
                animationId = requestAnimationFrame(animate);
            } else if (simulationTime >= simulationEndTime) {
                stopSimulation();
            }
        }
        
        function startSimulation() {
            if (!isRunning) {
                isRunning = true;
                animate();
            }
        }
        
        function stopSimulation() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }
        
        function resetSimulation() {
            stopSimulation();
            simulationTime = 0; // Reset simulation time
            // Read current values from input fields for reset
            initialSusceptibleCount = parseInt(document.getElementById('initialSusceptible').value);
            initialInfectedCount = parseInt(document.getElementById('initialInfected').value);
            initialRecoveredCount = parseInt(document.getElementById('initialRecovered').value);
            
            // Ensure inputs are non-negative here as well, in case user types a negative number directly
            if (isNaN(initialSusceptibleCount) || initialSusceptibleCount < 0) initialSusceptibleCount = 0;
            if (isNaN(initialInfectedCount) || initialInfectedCount < 0) initialInfectedCount = 0;
            if (isNaN(initialRecoveredCount) || initialRecoveredCount < 0) initialRecoveredCount = 0;

            document.getElementById('initialSusceptible').value = initialSusceptibleCount;
            document.getElementById('initialInfected').value = initialInfectedCount;
            document.getElementById('initialRecovered').value = initialRecoveredCount;

            createPopulation(); // Create population based on the adjusted initial counts
            
            chart.data.labels = [];
            chart.data.datasets.forEach(dataset => dataset.data = []);
            chart.update();
            updateStats(); // Update stats display based on new population
            draw();
        }
        
        // Initialize when page loads
        window.addEventListener('load', init);
        
        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            draw();
        });
    </script>
</body>
</html>
